<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Calendar</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-bottom: 10px;
}

button {
  padding: 8px 15px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 600px;
  margin: 0 auto;
}

/* 曜日 */
.weekday {
  text-align: center;
  font-weight: bold;
}

/* 日付 */
.day {
  background: white;
  border-radius: 10px;
  padding: 10px 0;
  text-align: center;
  cursor: pointer;
  font-size: 14px;
}

/* 今日 */
.today {
  background: #22c55e;
  color: white;
}

/* 選択 */
.active {
  background: #4f46e5;
  color: white;
}

/* メモあり */
.has-memo {
  border: 2px solid #4f46e5;
}

.memo-container {
  max-width: 600px;
  margin: 15px auto;
  background: white;
  padding: 15px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 100px;
}

/* 📱 スマホ対応 */
@media (max-width: 600px) {
  .day {
    font-size: 12px;
    padding: 8px 0;
  }
}
</style>
</head>

<body>

<h1>📅 My Calendar</h1>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <div id="currentMonth"></div>
  <button onclick="nextMonth()">▶</button>
</div>

<div id="calendar"></div>

<div class="memo-container">
  <textarea id="memo" placeholder="メモを書く..."></textarea>
  <button onclick="saveMemo()">保存</button>
</div>

<script>
let currentDate = new Date();
let selectedDate = null;

const calendar = document.getElementById("calendar");
const currentMonthText = document.getElementById("currentMonth");

function renderCalendar() {
  calendar.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  currentMonthText.textContent = `${year}年 ${month + 1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const weekdays = ["日","月","火","水","木","金","土"];

  // 曜日表示
  weekdays.forEach(day => {
    const div = document.createElement("div");
    div.textContent = day;
    div.classList.add("weekday");
    calendar.appendChild(div);
  });

  // 空白
  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let day = 1; day <= lastDate; day++) {
    const div = document.createElement("div");
    div.textContent = day;
    div.classList.add("day");

    const fullDate = `${year}-${month+1}-${day}`;

    // 今日
    const today = new Date();
    if (
      day === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ) {
      div.classList.add("today");
    }

    // メモチェック
    if (localStorage.getItem(fullDate)) {
      div.classList.add("has-memo");
    }

    div.onclick = () => {
      selectedDate = fullDate;

      document.querySelectorAll(".day").forEach(d => d.classList.remove("active"));
      div.classList.add("active");

      loadMemo(fullDate);
    };

    calendar.appendChild(div);
  }
}

function saveMemo() {
  if (!selectedDate) {
    alert("日付を選択してください");
    return;
  }

  const memo = document.getElementById("memo").value;
  localStorage.setItem(selectedDate, memo);
  renderCalendar();
}

function loadMemo(date) {
  const memo = localStorage.getItem(date);
  document.getElementById("memo").value = memo || "";
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
