<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Calendar</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: 20px auto;
    }

    .day {
      background: white;
      border-radius: 12px;
      padding: 15px 0;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .day:hover {
      background: #6366f1;
      color: white;
      transform: translateY(-3px);
    }

    .day.active {
      background: #4f46e5;
      color: white;
    }

    .day.has-memo {
      border: 2px solid #4f46e5;
    }

    .memo-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: 1px solid #ddd;
      padding: 10px;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>

<body>

<h1>📅 My Calendar</h1>

<div id="calendar"></div>

<div class="memo-container">
  <textarea id="memo" placeholder="メモを書く..."></textarea>
  <button onclick="saveMemo()">保存</button>
</div>

<script>
  const calendar = document.getElementById("calendar");
  let selectedDate = null;

  // カレンダー生成（1〜31日）
  function createCalendar() {
    for (let day = 1; day <= 31; day++) {
      const div = document.createElement("div");
      div.textContent = day;
      div.classList.add("day");

      div.onclick = () => selectDate(day, div);

      // メモがある日をチェック
      if (localStorage.getItem(day)) {
        div.classList.add("has-memo");
      }

      calendar.appendChild(div);
    }
  }

  function selectDate(day, element) {
    selectedDate = day;

    document.querySelectorAll(".day").forEach(d => d.classList.remove("active"));
    element.classList.add("active");

    loadMemo(day);
  }

  function saveMemo() {
    if (!selectedDate) {
      alert("日付を選択してください");
      return;
    }

    const memo = document.getElementById("memo").value;
    localStorage.setItem(selectedDate, memo);

    // メモありマーク更新
    document.querySelectorAll(".day").forEach(d => {
      const day = d.textContent;
      if (localStorage.getItem(day)) {
        d.classList.add("has-memo");
      }
    });

    alert("保存しました！");
  }

  function loadMemo(day) {
    const memo = localStorage.getItem(day);
    document.getElementById("memo").value = memo || "";
  }

  createCalendar();
</script>

</body>
</html>
